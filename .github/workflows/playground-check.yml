name: playground check

on:
  push:
    paths:
      - "playground/**"

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      # github format — shows annotations in Actions log
      - name: Run pythaw (github format)
        run: uvx pythaw check --format github --exit-zero playground/

      # sarif format — uploads to Code Scanning
      - name: Run pythaw (sarif format)
        run: uvx pythaw check --format sarif --exit-zero playground/ > results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        if: always()
