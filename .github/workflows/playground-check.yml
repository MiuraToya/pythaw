name: playground check

on:
  pull_request:
    paths:
      - "playground/**"

permissions:
  contents: read
  security-events: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      # github format → PR アノテーション表示
      - name: Run pythaw (github format)
        run: uvx pythaw check --format github --exit-zero playground/

      # sarif format → Code Scanning 連携
      - name: Run pythaw (sarif format)
        run: uvx pythaw check --format sarif --exit-zero playground/ > results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          ref: ${{ github.head_ref }}
          sha: ${{ github.event.pull_request.head.sha }}
        if: always()
